<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- Horizontal navy traces -->
  <line x1="0"   y1="60"  x2="90"  y2="60"  stroke="#0e2d55" stroke-width="0.6" opacity="0.14"/>
  <line x1="150" y1="60"  x2="240" y2="60"  stroke="#0e2d55" stroke-width="0.6" opacity="0.14"/>
  <line x1="0"   y1="180" x2="240" y2="180" stroke="#0e2d55" stroke-width="0.6" opacity="0.09"/>
  <!-- Vertical navy traces -->
  <line x1="60"  y1="0"   x2="60"  y2="240" stroke="#0e2d55" stroke-width="0.6" opacity="0.11"/>
  <line x1="180" y1="0"   x2="180" y2="90"  stroke="#0e2d55" stroke-width="0.6" opacity="0.13"/>
  <line x1="180" y1="150" x2="180" y2="240" stroke="#0e2d55" stroke-width="0.6" opacity="0.13"/>
  <!-- Component box -->
  <rect x="92" y="92" width="56" height="56" fill="none" stroke="#2563eb" stroke-width="0.7" opacity="0.11"/>
  <!-- Traces to component -->
  <line x1="92"  y1="120" x2="60"  y2="120" stroke="#2563eb" stroke-width="0.55" opacity="0.09"/>
  <line x1="148" y1="120" x2="180" y2="120" stroke="#2563eb" stroke-width="0.55" opacity="0.09"/>
  <line x1="120" y1="92"  x2="120" y2="60"  stroke="#2563eb" stroke-width="0.55" opacity="0.09"/>
  <line x1="120" y1="148" x2="120" y2="180" stroke="#2563eb" stroke-width="0.55" opacity="0.09"/>
  <!-- Center dot -->
  <circle cx="120" cy="120" r="3" fill="#2563eb" opacity="0.13"/>
  <!-- Pads -->
  <circle cx="60"  cy="120" r="2.5" fill="#2563eb" opacity="0.12"/>
  <circle cx="180" cy="120" r="2.5" fill="#2563eb" opacity="0.12"/>
  <circle cx="120" cy="60"  r="2.5" fill="#2563eb" opacity="0.12"/>
  <circle cx="120" cy="180" r="2.5" fill="#2563eb" opacity="0.12"/>
  <!-- Via holes -->
  <circle cx="60"  cy="60"  r="2.5" fill="none" stroke="#0e2d55" stroke-width="0.6" opacity="0.16"/>
  <circle cx="180" cy="60"  r="2.5" fill="none" stroke="#0e2d55" stroke-width="0.6" opacity="0.16"/>
  <circle cx="60"  cy="180" r="2"   fill="#0e2d55" opacity="0.13"/>
  <circle cx="180" cy="180" r="2"   fill="#0e2d55" opacity="0.13"/>
</svg>
