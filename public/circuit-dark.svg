<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <!-- Horizontal silver traces -->
  <line x1="0" y1="70" x2="105" y2="70" stroke="#c0c0c0" stroke-width="0.8" opacity="0.40"/>
  <line x1="175" y1="70" x2="280" y2="70" stroke="#c0c0c0" stroke-width="0.8" opacity="0.40"/>
  <line x1="0" y1="210" x2="280" y2="210" stroke="#c0c0c0" stroke-width="0.8" opacity="0.28"/>
  <!-- Vertical silver traces -->
  <line x1="70" y1="0" x2="70" y2="280" stroke="#c0c0c0" stroke-width="0.8" opacity="0.32"/>
  <line x1="210" y1="0" x2="210" y2="105" stroke="#c0c0c0" stroke-width="0.8" opacity="0.38"/>
  <line x1="210" y1="175" x2="210" y2="280" stroke="#c0c0c0" stroke-width="0.8" opacity="0.38"/>
  <!-- Gold IC component -->
  <rect x="107" y="107" width="66" height="66" fill="none" stroke="#f59e0b" stroke-width="1.0" opacity="0.52"/>
  <!-- Gold traces to component -->
  <line x1="107" y1="140" x2="70" y2="140" stroke="#f59e0b" stroke-width="0.8" opacity="0.42"/>
  <line x1="173" y1="140" x2="210" y2="140" stroke="#f59e0b" stroke-width="0.8" opacity="0.42"/>
  <line x1="140" y1="107" x2="140" y2="70" stroke="#f59e0b" stroke-width="0.8" opacity="0.42"/>
  <line x1="140" y1="173" x2="140" y2="210" stroke="#f59e0b" stroke-width="0.8" opacity="0.42"/>
  <!-- Center chip -->
  <circle cx="140" cy="140" r="5" fill="#f59e0b" opacity="0.62"/>
  <circle cx="140" cy="140" r="10" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.28"/>
  <!-- Gold pads -->
  <circle cx="70"  cy="140" r="3.5" fill="#f59e0b" opacity="0.52"/>
  <circle cx="210" cy="140" r="3.5" fill="#f59e0b" opacity="0.52"/>
  <circle cx="140" cy="70"  r="3.5" fill="#f59e0b" opacity="0.52"/>
  <circle cx="140" cy="210" r="3.5" fill="#f59e0b" opacity="0.52"/>
  <!-- Silver via holes -->
  <circle cx="70"  cy="70"  r="3.5" fill="none" stroke="#c0c0c0" stroke-width="0.9" opacity="0.55"/>
  <circle cx="210" cy="70"  r="3.5" fill="none" stroke="#c0c0c0" stroke-width="0.9" opacity="0.55"/>
  <circle cx="70"  cy="210" r="3"   fill="#c0c0c0" opacity="0.45"/>
  <circle cx="210" cy="210" r="3"   fill="#c0c0c0" opacity="0.45"/>
  <!-- Small component TL -->
  <rect x="15" y="28" width="32" height="18" rx="2" fill="none" stroke="#c0c0c0" stroke-width="0.7" opacity="0.35"/>
  <line x1="0"  y1="37" x2="15" y2="37" stroke="#c0c0c0" stroke-width="0.7" opacity="0.30"/>
  <line x1="47" y1="37" x2="70" y2="37" stroke="#c0c0c0" stroke-width="0.7" opacity="0.30"/>
  <circle cx="70" cy="37" r="1.5" fill="#c0c0c0" opacity="0.40"/>
  <!-- Small component BR -->
  <rect x="232" y="234" width="30" height="17" rx="2" fill="none" stroke="#c0c0c0" stroke-width="0.7" opacity="0.32"/>
  <line x1="210" y1="242" x2="232" y2="242" stroke="#c0c0c0" stroke-width="0.7" opacity="0.28"/>
  <!-- L-trace TR -->
  <line x1="210" y1="28" x2="252" y2="28" stroke="#c0c0c0" stroke-width="0.7" opacity="0.28"/>
  <line x1="252" y1="28" x2="252" y2="70" stroke="#c0c0c0" stroke-width="0.7" opacity="0.28"/>
  <circle cx="252" cy="70" r="2" fill="#c0c0c0" opacity="0.38"/>
  <!-- Gold accent trace -->
  <line x1="210" y1="70" x2="242" y2="70" stroke="#f59e0b" stroke-width="0.6" opacity="0.28"/>
  <line x1="242" y1="70" x2="242" y2="107" stroke="#f59e0b" stroke-width="0.6" opacity="0.28"/>
  <circle cx="242" cy="107" r="2" fill="#f59e0b" opacity="0.38"/>
  <!-- Short trace BL -->
  <line x1="0" y1="252" x2="70" y2="252" stroke="#c0c0c0" stroke-width="0.6" opacity="0.22"/>
  <circle cx="70" cy="252" r="2" fill="#c0c0c0" opacity="0.32"/>
</svg>
